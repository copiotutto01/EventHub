version: '3.8'

services:
  # Servizio Frontend React (Vite)
  frontend:
    build: ./frontend
    container_name: eventhub_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=https://symmetrical-fishstick-4jxj6vp7qq5wc7wp-5000.app.github.dev
      - VITE_KEYCLOAK_URL=https://symmetrical-fishstick-4jxj6vp7qq5wc7wp-8080.app.github.dev
    depends_on:
      - backend
    networks:
      - eventhub_network

  # Servizio Backend Flask
  backend:
    build: ./backend
    container_name: eventhub_backend
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://eventhub_admin:supersecretpassword123@postgres:5432/eventhub_db
      - FLASK_ENV=development
      - CELERY_BROKER_URL=redis://eventhub_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://eventhub_redis:6379/0
    depends_on:
      - postgres
      - keycloak
      - redis
    networks:
      - eventhub_network

  # Worker Celery per i task asincroni
  celery:
    build: ./backend
    container_name: eventhub_celery
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://eventhub_admin:supersecretpassword123@postgres:5432/eventhub_db
      - CELERY_BROKER_URL=redis://eventhub_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://eventhub_redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - eventhub_network

  # Database per l'applicazione e per Keycloak
  postgres:
    image: postgres:15-alpine
    container_name: eventhub_db
    environment:
      POSTGRES_DB: eventhub_db
      POSTGRES_USER: eventhub_admin
      POSTGRES_PASSWORD: supersecretpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventhub_network

  # Servizio di Autenticazione Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: eventhub_auth
    command: start-dev --http-relative-path=/
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpassword123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/eventhub_db
      KC_DB_USERNAME: eventhub_admin
      KC_DB_PASSWORD: supersecretpassword123
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: "edge"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - eventhub_network

  # Redis per la gestione dei task asincroni (Celery)
  redis:
    image: redis:7-alpine
    container_name: eventhub_redis
    ports:
      - "6379:6379"
    networks:
      - eventhub_network

networks:
  eventhub_network:
    driver: bridge

volumes:
  postgres_data: