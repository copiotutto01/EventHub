version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventhub_db
    environment:
      - POSTGRES_USER=eventhub_admin
      - POSTGRES_PASSWORD=supersecretpassword123
      - POSTGRES_DB=eventhub_db
    ports:
      - "5432:5432"
    volumes:
      - eventhub_postgres_data:/var/lib/postgresql/data
    networks:
      - eventhub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhub_admin -d eventhub_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventhub_redis
    ports:
      - "6379:6379"
    networks:
      - eventhub_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: eventhub_auth
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME_STRICT=false
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: start-dev --http-port=8080 --import-realm
    ports:
      - "8080:8080"
    networks:
      - eventhub_network

  backend:
    build: ./backend
    container_name: eventhub_backend
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://eventhub_admin:supersecretpassword123@postgres:5432/eventhub_db
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - CELERY_BROKER_URL=redis://eventhub_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://eventhub_redis:6379/0
    command: python -m flask run --host=0.0.0.0 --port=5000 --debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - eventhub_network

  frontend:
    build: ./frontend
    container_name: eventhub_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eventhub_network

networks:
  eventhub_network:
    name: eventhub_eventhub_network

volumes:
  eventhub_postgres_data: